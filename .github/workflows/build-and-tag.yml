name: "Build & Push Data API Image"

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: "Build and Push Data API"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4

      - name: "Log in to GitHub Container Registry"
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "Set up Docker Buildx"
        uses: docker/setup-buildx-action@v3

      - name: "Build and push"
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/farmhand-data-api:dev
            ghcr.io/${{ github.repository_owner }}/farmhand-data-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max